name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run examples:outputs -- tmp/examples
      - uses: actions/upload-artifact@v4
        with:
          name: example-audit-outputs
          path: tmp/examples
